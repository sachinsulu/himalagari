<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Listing</title>
  <link href="./blog_listing.css" rel="stylesheet">
  <link rel="icon" href="./assets/images/logo.png">
  <!-- bootstrp -->
  <link href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css' rel="stylesheet" >
  <!-- font-awesome -->
  <link  href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css' rel="stylesheet">
  <!-- Google Fonts -->
  <link  href='https://fonts.googleapis.com' rel="preconnect"/>
  <link  href='https://fonts.gstatic.com' crossorigin rel="preconnect"/>
  <link
    href='https://fonts.googleapis.com/css2?family=Fjalla+One&family=Orelega+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap'
    rel="stylesheet" />
  <link
    href='https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&family=Fjalla+One&family=Orelega+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap'
    rel="stylesheet" />
  <!-- owl carousel  -->
  <link  href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css' rel="stylesheet"/>
  <link 
    href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css' rel="stylesheet" />
</head>

<body>
  <section class="scroll-wrapper">
    <!-- navbar -->
    <jcms:module:header/>

    <jcms:module:bloglist/>

    <!-- footer -->
    <jcms:module:footer/>

  </section>


  
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/jquery.validate.min.js'></script>
  <script src="script.js"></script>

  <script>
      const grid = document.getElementById("packageGrid");
      const wrapper = document.querySelector(".package-grid-wrapper");
      const toggleBtn = document.getElementById("toggleBtn");
      const title = document.getElementById("blog_title");

      if (grid && wrapper && toggleBtn && title && grid.children.length > 0) {
        const cardsPerRow = 3;
        const cardTemplate = grid.children[0].outerHTML;
        let expanded = false;

        function updateHeight() {
          wrapper.style.maxHeight = grid.scrollHeight + "px";
        }

        updateHeight();

        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            updateHeight();
          }, 100);
        });

        toggleBtn.addEventListener("click", () => {
          if (!expanded) {
            for (let i = 0; i < cardsPerRow; i++) {
              grid.insertAdjacentHTML("beforeend", cardTemplate);
            }

            requestAnimationFrame(updateHeight);
            toggleBtn.childNodes[0].textContent = "Load Less";
            expanded = true;
          } else {
            const cardsToRemove = [...grid.children].slice(-cardsPerRow);

            title.scrollIntoView({
              behavior: "smooth",
              block: "start"
            });

            cardsToRemove.forEach(card => card.classList.add("removing"));

            setTimeout(() => {
              cardsToRemove.forEach(card => card.remove());
              updateHeight();
            }, 350);

            toggleBtn.childNodes[0].textContent = "Load More";
            expanded = false;
          }
        });
      }
  </script>

</body>

</html>
