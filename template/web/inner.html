  <script>
    const images = document.querySelectorAll('.popup-img');
    const popup = document.getElementById('imgPopup');
    const popupImg = document.getElementById('popupImage');
    const closeBtn = document.querySelector('.close');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');

    let currentIndex = 0;

    // Open popup
    images.forEach((img, index) => {
      img.addEventListener('click', () => {
        popup.style.display = 'flex';
        popupImg.src = img.src;
        currentIndex = index;
      });
    });

    // Close popup
    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    // Click outside image to close
    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.style.display = 'none';
      }
    });

    // Show previous image
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent popup close
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      popupImg.src = images[currentIndex].src;
    });

    // Show next image
    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent popup close
      currentIndex = (currentIndex + 1) % images.length;
      popupImg.src = images[currentIndex].src;
    });


    document.addEventListener('DOMContentLoaded', () => {

      document.querySelectorAll('.team-section').forEach(section => {
        const tabs = section.querySelectorAll('.team-tabs .tab');
        const contents = section.querySelectorAll('.team-content');

        function activateTab(tab) {
          const targetId = tab.dataset.tab;

          tabs.forEach(t => t.classList.remove('active'));
          contents.forEach(c => c.classList.remove('active'));

          tab.classList.add('active');
          section.querySelector('#' + targetId).classList.add('active');
        }


        if (tabs.length > 0) {
          activateTab(tabs[0]);
        }

        tabs.forEach(tab => {
          tab.addEventListener('click', () => activateTab(tab));
        });
      });

    });



    document.addEventListener("DOMContentLoaded", () => {
      const toggleBtns = document.querySelectorAll(".searchToggle");
      const bottomSearch = document.querySelector(".bottomSearch");

      toggleBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          bottomSearch.classList.toggle("active");
        });
      });

      bottomSearch.addEventListener("click", (e) => {
        e.stopPropagation();
      });

      document.addEventListener("click", () => {
        bottomSearch.classList.remove("active");
      });
    });


    document.addEventListener("DOMContentLoaded", () => {
      const toggleBtns = document.querySelectorAll(".searchToggle");
      const bottomSearch = document.querySelector(".bottomSearch");

      // Toggle on button click
      toggleBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation(); // prevent document click from firing
          bottomSearch.classList.toggle("active");
        });
      });

      // Click outside to close
      document.addEventListener("click", (e) => {
        const clickedInsideSearch = bottomSearch.contains(e.target);
        const clickedToggleBtn = [...toggleBtns].some((btn) =>
          btn.contains(e.target)
        );

        if (!clickedInsideSearch && !clickedToggleBtn) {
          bottomSearch.classList.remove("active");
        }
      });
    });



  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      // Select all show-more buttons
      const showMoreBtns = document.querySelectorAll('.team-member .show-more');

      showMoreBtns.forEach(btn => {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          // Find the popup inside this team member
          const popup = this.closest('.team-member').querySelector('.popup-overlay');
          if (popup) {
            popup.style.display = 'flex';
          }
        });
      });

      // Close popup buttons
      const closeBtns = document.querySelectorAll('.popup-overlay .close-btn');
      closeBtns.forEach(btn => {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          const popup = this.closest('.popup-overlay');
          popup.style.display = 'none';
        });
      });

      // Close popup if clicking outside the box
      const popups = document.querySelectorAll('.popup-overlay');
      popups.forEach(popup => {
        popup.addEventListener('click', function (e) {
          if (e.target === this) {
            this.style.display = 'none';
          }
        });
      });

    });
    const planCountry = document.getElementById("planCountry");
    const planCountryCode = document.getElementById("planCountryCode");

    planCountry.addEventListener("change", function () {
      const selected = this.selectedOptions[0];
      const code = selected.getAttribute("data-code") || "";
      planCountryCode.value = code;
    });
  </script>

  <script>
    document.getElementById("country").addEventListener("change", function () {
      document.getElementById("countryCode").value = this.value;
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const today = new Date().toISOString().split("T")[0];

      // Apply to all date inputs (safe & future-proof)
      document.querySelectorAll('input[type="date"]').forEach(input => {
        input.setAttribute("min", today);
      });
    });
  </script>
