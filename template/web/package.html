  <script>
    function goToPage(page) {

    document.addEventListener("DOMContentLoaded", () => {
      const toggleBtns = document.querySelectorAll(".searchToggle");
      const bottomSearch = document.querySelector(".bottomSearch");

      // Toggle on button click
      toggleBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation(); // prevent document click from firing
          bottomSearch.classList.toggle("active");
        });
      });

      // Click outside to close
      document.addEventListener("click", (e) => {
        const clickedInsideSearch = bottomSearch.contains(e.target);
        const clickedToggleBtn = [...toggleBtns].some((btn) =>
          btn.contains(e.target)
        );

        if (!clickedInsideSearch && !clickedToggleBtn) {
          bottomSearch.classList.remove("active");
        }
      });
    });

  <script>
    $(document).ready(function () {
      $('#packageGrid').owlCarousel({
        loop: true,
        margin: 20,
        items: 3,
        autoplay: true,
        autoWidth: false,
        autoHeight: true,
        autoplayTimeout: 3500,
        autoplayHoverPause: true,
        dots: true,
        nav: false,
        stagePadding: 0,

        responsive: {
          0: {
            items: 1
          },
          768: {
            items: 2
          },
          1200: {
            items: 3
          }
        }
      });
    });

    const pricePerPerson = 400;

    const peopleInput = document.getElementById("peopleCount");
    const amountSpan = document.getElementById("amountValue");

    function updateTotal() {
      const count = parseInt(peopleInput.value) || 1;
      amountSpan.textContent = count * pricePerPerson;
    }

    // Update on change & typing
    peopleInput.addEventListener("input", updateTotal);

    // Initial calculation
    updateTotal();



    document.addEventListener("DOMContentLoaded", () => {

      const visible = document.querySelectorAll(".gallery-img");
      const hidden = document.querySelectorAll("#hiddenGallery img");

      console.log("Visible images:", visible.length);
      console.log("Hidden images:", hidden.length);

      const galleryImages = [
        ...Array.from(visible).map(img => img.src),
        ...Array.from(hidden).map(img => img.src)
      ];

      console.log("TOTAL gallery images:", galleryImages.length);
      console.log(galleryImages);

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightboxImg");

      let index = 0;

      visible.forEach((img, i) => {
        img.addEventListener("click", () => {
          index = i;
          lightboxImg.src = galleryImages[index];
          lightbox.style.display = "flex";
        });
      });

      document.querySelector(".next").onclick = () => {
        index = (index + 1) % galleryImages.length;
        lightboxImg.src = galleryImages[index];
      };


      document.querySelector(".prev").onclick = () => {
        index = (index - 1 + galleryImages.length) % galleryImages.length;
        lightboxImg.src = galleryImages[index];
      };

      document.querySelector(".close").onclick = () => {
        lightbox.style.display = "none";
      };
      const viewAllBtn = document.querySelector('.view-more-btn');
      const firstGalleryImage = document.querySelector('.gallery-img');

      viewAllBtn.addEventListener('click', () => {
        firstGalleryImage.click();
      });

    });



    document.addEventListener("DOMContentLoaded", function () {
      // Get all selects and code inputs
      const countrySelects = document.querySelectorAll(".country-select");
      const countryCodes = document.querySelectorAll(".country-code");

      // Country code map
      const countryCodeMap = {
        Nepal: "+977",
        India: "+91",
        UAE: "+971",
        Bangladesh: "+880",
        "Sri Lanka": "+94"
      };

      // Loop through each select
      countrySelects.forEach((select, index) => {
        select.addEventListener("change", () => {
          const code = countryCodeMap[select.value] || "";
          if (countryCodes[index]) {
            countryCodes[index].value = code;
          }
        });
      });
    });

    const customizeBtn = document.querySelector(".customize_btn");
    const customizeBooking = document.getElementById("customize_booking");
    const closeCustomize = document.querySelector(".close-customize");

    // Show modal
    customizeBtn.addEventListener("click", () => {
      customizeBooking.style.display = "flex";
      customizeBooking.scrollIntoView({ behavior: "smooth" });
    });

    // Close modal
    closeCustomize.addEventListener("click", () => {
      customizeBooking.style.display = "none";
    });

    // Close modal when clicking outside content
    customizeBooking.addEventListener("click", (e) => {
      if (e.target === customizeBooking) {
        customizeBooking.style.display = "none";
      }
    });

    const planCountry = document.getElementById("planCountry");
    const planCountryCode = document.getElementById("planCountryCode");

    planCountry.addEventListener("change", function () {
      const selected = this.selectedOptions[0];
      const code = selected.getAttribute("data-code") || "";
      planCountryCode.value = code;
    });


  </script>
