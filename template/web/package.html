<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package-inner</title>
  <link rel="icon" href="./assets/images/logo.png">
  <link href="./package-inner.css" rel="stylesheet">
  <link href="./holiday_types_inner.css" rel="stylesheet">
  <link href="./package_listing.css" rel="stylesheet">
  <!-- bootstrp -->
  <link href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css' rel="stylesheet">
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css' rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href='https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css' rel="stylesheet">

  <!-- font-awesome -->
  <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css' rel="stylesheet">
  <!-- Google Fonts -->
  <link href='https://fonts.googleapis.com' rel="preconnect" />
  <link href='https://fonts.gstatic.com' rel="preconnect" crossorigin />
  <link
    href='https://fonts.googleapis.com/css2?family=Fjalla+One&family=Orelega+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap'
    rel="stylesheet" />
  <link
    href='https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&family=Fjalla+One&family=Orelega+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap'
    rel="stylesheet" />
  <link href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css' rel="stylesheet">
  <link href='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css'
    rel="stylesheet">
</head>

<body>
  <section class="scroll-wrapper">
    <!-- navbar -->
    <jcms:module:header/>

    <!-- inner-package-main -->
    <jcms:module:package-detail/>

    <!-- footer -->
    <jcms:module:footer/>

  </section>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/jquery.validate.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js'></script>
  <script src="script.js"></script>

  <script>
    $(document).ready(function () {
      $('.owl-carousel').owlCarousel({
        items: 3,
        loop: true,
        margin: 10,
        nav: false,
        autoplay: true,
        autoplayTimeout: 3000,
        stagePadding: 10,
        navText: ["<span class='owl-prev'>&lt</span>", "<span class='owl-next'>&gt</span>"],
        responsive: {
          0: {
            items: 1
          },
          600: {
            items: 2
          },
          1000: {
            items: 3
          }
        }
      });

      const dateInput = document.getElementById('travelDate');
      if (dateInput) {
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
      }
    });

    const peopleCount = document.getElementById("peopleCount");
    const totalAmount = document.getElementById("totalAmount");
    const basePrice = 400;
    if (peopleCount && totalAmount) {
        peopleCount.addEventListener("input", () => {
        const people = parseInt(peopleCount.value) || 1;
        totalAmount.value = basePrice * people;
        });
    }


    const popup = document.getElementById("featuresPopup");
    const closeBtn = document.getElementById("closePopup");

    document.querySelectorAll(".view-more").forEach(btn => {
      btn.addEventListener("click", e => {
        e.preventDefault();
        if (popup) {
            popup.style.display = "flex";
            document.body.style.overflow = "hidden";
        }
      });
    });

    if (closeBtn) {
        closeBtn.addEventListener("click", () => {
        popup.style.display = "none";
        document.body.style.overflow = "";
        });
    }

    if (popup) {
        popup.addEventListener("click", e => {
        if (e.target === popup) {
            popup.style.display = "none";
            document.body.style.overflow = "";
        }
        });
    }

    $(document).ready(function () {
      $('#packageGrid').owlCarousel({
        loop: true,
        margin: 20,
        items: 3,
        autoplay: true,
        autoWidth: false,
        autoHeight: true,
        autoplayTimeout: 3500,
        autoplayHoverPause: true,
        dots: true,
        nav: false,
        stagePadding: 0,

        responsive: {
          0: { items: 1 },
          768: { items: 2 },
          1200: { items: 3 }
        }
      });
    });

    const pricePerPerson = 400;
    const peopleInput = document.getElementById("peopleCount");
    const amountSpan = document.getElementById("amountValue");

    function updateTotal() {
      if (!peopleInput || !amountSpan) return;
      const count = parseInt(peopleInput.value) || 1;
      amountSpan.textContent = count * pricePerPerson;
    }

    if (peopleInput) {
        peopleInput.addEventListener("input", updateTotal);
        updateTotal();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const visible = document.querySelectorAll(".gallery-img");
      const hidden = document.querySelectorAll("#hiddenGallery img");
      const galleryImages = [
        ...Array.from(visible).map(img => img.src),
        ...Array.from(hidden).map(img => img.src)
      ];

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightboxImg");
      let index = 0;

      visible.forEach((img, i) => {
        img.addEventListener("click", () => {
          index = i;
          if (lightboxImg) lightboxImg.src = galleryImages[index];
          if (lightbox) lightbox.style.display = "flex";
        });
      });

      const nextBtn = document.querySelector(".next");
      if (nextBtn) {
          nextBtn.onclick = () => {
            index = (index + 1) % galleryImages.length;
            lightboxImg.src = galleryImages[index];
          };
      }

      const prevBtn = document.querySelector(".prev");
      if (prevBtn) {
          prevBtn.onclick = () => {
            index = (index - 1 + galleryImages.length) % galleryImages.length;
            lightboxImg.src = galleryImages[index];
          };
      }

      const closeLightboxBtn = document.querySelector(".close");
      if (closeLightboxBtn) {
          closeLightboxBtn.onclick = () => {
            lightbox.style.display = "none";
          };
      }
      
      const viewAllBtn = document.querySelector('.view-more-btn');
      const firstGalleryImage = document.querySelector('.gallery-img');
      if (viewAllBtn && firstGalleryImage) {
          viewAllBtn.addEventListener('click', () => {
            firstGalleryImage.click();
          });
      }
    });

    const customizeBtn = document.querySelector(".customize_btn");
    const customizeBooking = document.getElementById("customize_booking");
    const closeCustomize = document.querySelector(".close-customize");

    if (customizeBtn && customizeBooking) {
        customizeBtn.addEventListener("click", () => {
        customizeBooking.style.display = "flex";
        customizeBooking.scrollIntoView({ behavior: "smooth" });
        });
    }

    if (closeCustomize && customizeBooking) {
        closeCustomize.addEventListener("click", () => {
        customizeBooking.style.display = "none";
        });
    }

    if (customizeBooking) {
        customizeBooking.addEventListener("click", (e) => {
        if (e.target === customizeBooking) {
            customizeBooking.style.display = "none";
        }
        });
    }
  </script>
</body>
</html>
