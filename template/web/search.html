<body class="search-page">
    <section>
        <jcms:module:header/>

        <!-- nepal-hero-content -->
        
        <section class="packages-wrapper search-wrapper">
             <h2 class="text-center green-title">Search <span class="orange-text">Packages</span></h2>
                  <div class="container-fluid px-3 px-lg-5 pt-4" id="scrolll" style="max-width: 1400px;">
                <div class="row align-items-start">
                    <div class="col-12 col-lg-3">
                        <jcms:module:search-searchform/>
                    </div>

                    <div class="col-12 col-lg-9">
                        <div class="package-grid-wrapper" style="max-height: none;">

                        </div>

                        <div class="pager-wrappper mt-4" id="filter-nav">

        <!-- whatsapp -->

    </section>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js'></script>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js'></script>
    <script src="script.js"></script>

    <script type="text/javascript">
        var base_url = jQuery('base').attr('url') || '/';

        // Read more
        $('#read_more').on('click', function (e) {
            e.preventDefault();
            $('html, body').animate({
                scrollTop: eval($("#read").offset().top - 100)
            }, 700);
        });

        // form filtering data
        function triggerFilter() {
            var form = $("#search_form");
            $.ajax({
                type: "POST",
                url: base_url + "search_filter.php",
                dataType: "JSON",
                data: "action=filter_data&" + form.serialize(),
                success: function (data) {
                    var msg = eval(data);
                    jQuery('div#filter-data').html(msg.result);
                    jQuery('div#filter-nav').html(msg.nav);
                    
                    $('.gnav').on('click', function () {
                        $(this).navFunction();
                    });
                    
                    $('html, body').animate({
                        scrollTop: eval($("#scrolll").offset().top - 70)
                    }, 500);
                }
            });
        }

        $(document).on('click', '.gdays, .qdestination, .qactivities, .gdifficulty, .gprice', function () {
            triggerFilter();
        });

        $(document).on('submit', '#search_form', function (e) {
            e.preventDefault();
            triggerFilter();
        });

        // navigation function
        $.fn.navFunction = function () {
            var link = $(this).attr("hreff");
            $('#search_form').attr('action', link);
            $('#search_form').submit();
        };
        $(document).on('click', '.gnav', function () {
            $(this).navFunction();
        });

    </script>
    
</body>
