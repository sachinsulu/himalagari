    <!-- We must properly get base_url. The original code had: var base_url = jQuery('base').attr('url'); -->
    <script type="text/javascript">
        var base_url = jQuery('base').attr('url') || '/';

        // Read more
        $('#read_more').on('click', function (e) {
            e.preventDefault();
            $('html, body').animate({
                scrollTop: eval($("#read").offset().top - 100)
            }, 700);
        });

        // function to setup explore button routing
        function goToPage(page) {
            window.location.href = page;
        }

        // form filtering data
        function triggerFilter() {
            var form = $("#search_form");
            $.ajax({
                type: "POST",
                url: base_url + "search_filter.php",
                dataType: "JSON",
                data: "action=filter_data&" + form.serialize(),
                success: function (data) {
                    var msg = eval(data);
                    jQuery('div#filter-data').html(msg.result);
                    jQuery('div#filter-nav').html(msg.nav);
                    
                    $('.gnav').on('click', function () {
                        $(this).navFunction();
                    });
                    
                    $('html, body').animate({
                        scrollTop: eval($("#scrolll").offset().top - 70)
                    }, 500);
                }
            });
        }

        $(document).on('click', '.gdays, .qdestination, .qactivities, .gdifficulty, .gprice', function () {
            triggerFilter();
        });

        $(document).on('submit', '#search_form', function (e) {
            e.preventDefault();
            triggerFilter();
        });

        // navigation function
        $.fn.navFunction = function () {
            var link = $(this).attr("hreff");
            $('#search_form').attr('action', link);
            $('#search_form').submit();
        };
        $(document).on('click', '.gnav', function () {
            $(this).navFunction();
        });

    </script>
    
</body>
